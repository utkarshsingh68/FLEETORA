services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fleetora
      POSTGRES_USER: fleetora
      POSTGRES_PASSWORD: fleetora_local
    ports: ["5432:5432"]
    volumes: ["fleetora_pg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetora"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes: ["fleetora_redis:/data"]
  api:
    build: ./server
    env_file: ./server/.env
    ports: ["4000:4000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
volumes:
  fleetora_pg:
  fleetora_redis:
